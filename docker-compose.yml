version: '3.8'

services:
  # Сервис для фронтенда
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000" # Порт фронтенда
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api # URL бэкенда

  # Сервис для бэкенда
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000" # Порт бэкенда
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/usersdb # URL базы данных
    depends_on:
      - mongo

  # Сервис для базы данных (MongoDB)
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017" # Порт MongoDB
    volumes:
      - mongo-data:/data/db # Хранение данных

volumes:
  mongo-data: # Объем для хранения данных MongoDB